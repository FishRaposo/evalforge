name: AI Evaluation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest tests/ -v --tb=short --cov=evalforge --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml

  evaluate-mock:
    name: Run Evaluations (Mock Backend)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run RAG basic evaluation
        run: evalforge eval example_suites/rag_basic.yaml --format markdown --output ./reports

      - name: Run citation evaluation
        run: evalforge eval example_suites/rag_citation.yaml --format json --output ./reports

      - name: Run compliance evaluation
        run: evalforge eval example_suites/compliance.yaml --format html --output ./reports

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: evaluation-reports
          path: reports/
          retention-days: 30

  evaluate-openai:
    name: Run Evaluations (OpenAI Backend)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run RAG evaluation with OpenAI
        run: evalforge eval example_suites/rag_basic.yaml --backend openai --format json --output ./reports --fail-threshold 0.7
        env:
          EVALFORGE_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVALFORGE_OPENAI_MODEL: gpt-4o-mini

      - name: Upload OpenAI evaluation reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: openai-evaluation-reports
          path: reports/
          retention-days: 30
